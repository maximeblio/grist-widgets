<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Récapitulatif</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f8f9fa;
    --white: #ffffff;
    --border: #e9ecef;
    --text: #212529;
    --muted: #868e96;
    --accent: #2f80ed;
    --success: #2ecc71;
    --warning: #f39c12;
  }
  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    width: 100%;
    max-width: 360px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .header {
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .title {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
  }
  .progress-section { margin-bottom: 24px; }
  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-label { font-size: 12px; color: var(--muted); font-weight: 500; }
  .progress-pct { font-size: 13px; font-weight: 600; color: var(--accent); }
  .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    width: 0%;
    transition: width 1s ease;
  }
  .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
  .stat { text-align: center; padding: 14px 8px; background: var(--bg); border-radius: 8px; }
  .stat-label { font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .stat-value { font-size: 18px; font-weight: 600; color: var(--text); }
  .stat-value.green { color: var(--success); }
  .stat-value.orange { color: var(--warning); }
  .stat-value.blue { color: var(--accent); }
  .loading { text-align: center; color: var(--muted); font-size: 13px; padding: 40px; }
</style>
</head>
<body>
<div class="card">
  <div id="loading" class="loading">Chargement...</div>
  <div id="content" style="display:none">
    <div class="header">
      <div class="title" id="affectation">—</div>
      <div class="subtitle" id="nomcomplet">—</div>
    </div>
    <div class="progress-section">
      <div class="progress-header">
        <span class="progress-label">Progression annuelle</span>
        <span class="progress-pct" id="percent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-label">Effectuées</div>
        <div class="stat-value green" id="effectuees">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Restantes</div>
        <div class="stat-value orange" id="restantes">—</div>
      </div>
      <div class="stat">
        <div class="stat-label">Contrat</div>
        <div class="stat-value blue" id="contrat">—</div>
      </div>
    </div>
  </div>
</div>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<script>
  function toMin(t) {
    if (!t || t === '0:00') return 0;
    if (typeof t === 'number') return Math.round(t);
    const parts = String(t).split(':');
    if (parts.length === 2) return parseInt(parts[0]) * 60 + parseInt(parts[1]);
    return 0;
  }
  function formatH(min) {
    const h = Math.floor(Math.abs(min) / 60);
    const m = Math.abs(min) % 60;
    return h + 'h' + m.toString().padStart(2, '0');
  }
  grist.ready({ requiredAccess: 'read table' });
  grist.onRecords(function(records) {
    if (!records || records.length === 0) return;
    const r = records[0];
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    // Nom, prénom, affectation
    document.getElementById('nomcomplet').textContent =
      (r.Moniteurs_Prenom || '') + ' ' + (r.Moniteurs_Nom || '');
    document.getElementById('affectation').textContent =
      r.Moniteurs_Affectation || 'Monitorat étudiant';

    // Heures
    const effectMin = toMin(r.Total_annuel_min !== undefined ? r.Total_annuel_min : r.Total_annuel);
    const restMin = toMin(r.Heures_restantes_min !== undefined ? r.Heures_restantes_min : r.Heures_restantes);
    const contrat = parseInt(r.Contrat || 0);
    const contratMin = contrat * 60;
    const pct = contratMin > 0 ? Math.min(Math.round((effectMin / contratMin) * 100), 100) : 0;

    document.getElementById('effectuees').textContent = formatH(effectMin);
    document.getElementById('restantes').textContent = formatH(restMin);
    document.getElementById('contrat').textContent = contrat + 'h';
    document.getElementById('percent').textContent = pct + '%';

    setTimeout(() => {
      document.getElementById('progressFill').style.width = pct + '%';
    }, 100);
  });
</script>
</body>
</html>
